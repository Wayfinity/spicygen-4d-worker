name: Build and Push RunPod Serverless Image

on:
  push:
    branches: [ "main" ] # Triggers the build whenever you push to main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Critical Step: Free up ~30GB of hidden disk space on the GitHub Runner
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap: true

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Push Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          mavid/spicygen-4d:latest
          mavid/spicygen-4d:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max