name: Build and Push Docker Image to Docker Hub + Update RunPod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Remove Git metadata
        run: rm -rf .git

      # 3) Prune any old Docker images/containers and runner caches
      - name: Free up space prune Docker & caches
        run: |
          docker system prune -af
          sudo rm -rf /home/runner/.cache
          sudo rm -rf /home/runner/work/_temp/*
          sudo apt-get clean
          sudo apt-get autoremove -y
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /tmp/*
          sudo rm -rf /var/tmp/*
          df -h
 
      # 4) Mirror your workspace into the runner’s temp (on the big volume)
      - name: Copy source to runner temp
        run: |
          mkdir -p $RUNNER_TEMP/build
          rsync -a --exclude='.git' . $RUNNER_TEMP/build/

      # 5) (Optional) check that you really do have extra room there
      - name: Check disk usage in temp
        run: |
          df -h
          du -sh $RUNNER_TEMP/build

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            mavid/spicygen-4d-worker:latest
            mavid/spicygen-4d-worker:${{ github.sha }}
